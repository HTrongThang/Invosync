<!-- ── Premium Reusable Global Dialog ── -->
<div class="global-dialog-overlay" id="global-dialog-overlay" onclick="closeGlobalDialog()"></div>
<div class="global-dialog" id="global-dialog" role="dialog" aria-modal="true" aria-labelledby="global-dialog-title">
    <button type="button" class="global-dialog-close-btn" onclick="closeGlobalDialog()" aria-label="Đóng">
        <i class="ri-close-line"></i>
    </button>
    
    <div class="global-dialog-body">
        <div class="global-dialog-icon-wrapper" id="global-dialog-icon">
            <!-- Icon will be injected here via JS -->
        </div>
        
        <h3 id="global-dialog-title" class="global-dialog-title">Thông báo</h3>
        <p id="global-dialog-message" class="global-dialog-message"></p>
    </div>
    
    <div class="global-dialog-footer">
        <button type="button" id="global-dialog-btn" class="global-dialog-action-btn" onclick="closeGlobalDialog()">Đóng</button>
    </div>
</div>

<style>
/* Premium Global Dialog Styles */
.global-dialog-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 9998;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
}

.global-dialog {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -45%) scale(0.9);
    background: #ffffff;
    width: 90%;
    max-width: 380px;
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    z-index: 9999;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    padding: 30px 20px 25px;
    text-align: center;
}

.global-dialog.is-active,
.global-dialog-overlay.is-active {
    opacity: 1;
    visibility: visible;
}

.global-dialog.is-active {
    transform: translate(-50%, -50%) scale(1);
}

/* Close Button (Top Right) */
.global-dialog-close-btn {
    position: absolute;
    top: 15px; right: 15px;
    background: transparent;
    border: none;
    font-size: 24px;
    color: #94a3b8;
    cursor: pointer;
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
}
.global-dialog-close-btn:hover {
    background: #f1f5f9;
    color: #475569;
}

/* Icons */
.global-dialog-icon-wrapper {
    margin: 0 auto 20px;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
}

/* Success State */
.global-dialog-icon-wrapper.success {
    background: #ecfdf5;
    color: #10b981;
    box-shadow: 0 0 0 10px rgba(16, 185, 129, 0.1);
    animation: pulseSuccess 2s infinite;
}
@keyframes pulseSuccess { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

/* Error State */
.global-dialog-icon-wrapper.error {
    background: #fef2f2;
    color: #ef4444;
    box-shadow: 0 0 0 10px rgba(239, 68, 68, 0.1);
    animation: shakeError 0.5s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shakeError { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

/* Info/Update State */
.global-dialog-icon-wrapper.info {
    background: #eff6ff;
    color: #3b82f6;
    box-shadow: 0 0 0 10px rgba(59, 130, 246, 0.1);
    animation: bounceInfo 2s infinite;
}
@keyframes bounceInfo { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }

/* Typography */
.global-dialog-title {
    margin: 0 0 10px 0;
    font-size: 22px;
    font-weight: 700;
    color: #1e293b;
    letter-spacing: -0.5px;
}

.global-dialog-message {
    margin: 0 0 25px 0;
    font-size: 15px;
    color: #64748b;
    line-height: 1.6;
}

/* Button */
.global-dialog-footer {
    display: flex;
    justify-content: center;
    width: 100%;
}

.global-dialog-action-btn {
    width: 100%;
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
}
/* Colors dynamically applied via JS based on type */
.btn-success { background: #10b981; box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39); }
.btn-success:hover { background: #059669; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.23); }

.btn-error { background: #ef4444; box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.39); }
.btn-error:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(239, 68, 68, 0.23); }

.btn-info { background: #3b82f6; box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39); }
.btn-info:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23); }
</style>

<script>
window.showGlobalDialog = function(message, type = 'info', title = null) {
    const dialog = document.getElementById('global-dialog');
    const overlay = document.getElementById('global-dialog-overlay');
    const iconContainer = document.getElementById('global-dialog-icon');
    const titleEl = document.getElementById('global-dialog-title');
    const messageEl = document.getElementById('global-dialog-message');
    const actionBtn = document.getElementById('global-dialog-btn');

    if (!dialog || !overlay) return;

    // Remove existing animations to restart them
    iconContainer.classList.remove('success', 'error', 'info');
    void iconContainer.offsetWidth; // trigger reflow
    iconContainer.classList.add(type);

    let iconClass, defaultTitle, btnClass, btnText;
    
    if (type === 'success') {
        iconClass = 'ri-check-line';
        defaultTitle = 'Thành công';
        btnClass = 'btn-success';
        btnText = 'Tuyệt vời';
    } else if (type === 'error') {
        iconClass = 'ri-close-line';
        defaultTitle = 'Thất bại';
        btnClass = 'btn-error';
        btnText = 'Thử lại';
    } else { // info/update
        iconClass = 'ri-information-line';
        defaultTitle = 'Thông báo';
        btnClass = 'btn-info';
        btnText = 'Đã hiểu';
    }

    iconContainer.innerHTML = '<i class="' + iconClass + '"></i>';
    titleEl.textContent = title || defaultTitle;
    messageEl.innerHTML = message;
    
    actionBtn.className = 'global-dialog-action-btn ' + btnClass;
    actionBtn.textContent = btnText;

    dialog.classList.add('is-active');
    overlay.classList.add('is-active');
}

window.closeGlobalDialog = function() {
    const dialog = document.getElementById('global-dialog');
    const overlay = document.getElementById('global-dialog-overlay');
    if (dialog) dialog.classList.remove('is-active');
    if (overlay) overlay.classList.remove('is-active');
}
</script>
